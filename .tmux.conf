# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",*256col*:RGB"
set -g mouse on
set -g set-clipboard external

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Pane resizing
bind-key j resize-pane -D 10
bind-key k resize-pane -U 10
bind-key h resize-pane -L 10
bind-key l resize-pane -R 10

# Splits (open in current path)
bind '|' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window navigation (no prefix)
bind -n M-h previous-window
bind -n M-l next-window

# Session picker
bind S choose-tree -s

# Status bar
set -g status-position top
set -g status-style "bg=default,fg=colour15"
set -g status-left "#[bg=colour4,fg=colour0] #S #[bg=default] "
set -g status-left-length 30
set -g status-right "#[bg=colour8,fg=colour15] %b %d #[bg=colour4,fg=colour0] %H:%M "
set -g status-right-length 30
set -g status-justify centre
set -g window-status-format "#[bg=colour8,fg=colour0] #I:#W "
set -g window-status-current-format "#[bg=colour4,fg=colour0] #I:#W "
set -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"

# Selection
set -g mode-style "bg=default,fg=default,reverse"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
